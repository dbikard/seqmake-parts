site_name: DNA Parts Catalog
site_description: An open, community-curated catalog of annotated DNA parts.
docs_dir: docs

theme:
  name: material
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.top
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences

# Interactive part-view widget: a self-contained, shadow-DOM-isolated bundle
# (built from seqmake's viewer core, vendored into docs/assets/) that hydrates
# the `<div data-part-view data-mol=...>` placeholder on each part page from
# its MoleculeInfo sidecar. The fonts are loaded at document level so the
# widget's shadow DOM can use them.
extra_css:
  - https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap

extra_javascript:
  - assets/seqmake-part-view.js

plugins:
  - search
  - tags

validation:
  nav:
    omitted_files: ignore
  not_found: warn

# Per-type pages are generated by tools/build_catalog.py (one per SO type with
# >=1 validated part). Add a line here when the FIRST part of a new type is
# validated; the index + tag index discover all type pages regardless.
nav:
  - Catalog: index.md
  - Browse by type:
      - Promoters: types/promoters.md
      - Origins of replication: types/origins-of-replication.md
      - Coding sequences: types/coding-sequences.md
  - Tags: tags.md
