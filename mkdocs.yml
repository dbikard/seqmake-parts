site_name: SeqMake Parts
site_description: SeqMake Parts — a machine-readable, provenance-tracked knowledge base of standard biological parts (SBOL/RDF + GenBank), linked into UniProt.
docs_dir: docs

theme:
  name: material
  # The landing page (docs/index.md) sets `template: home.html`, a standalone
  # custom template here that renders the redesigned, data-driven catalog home
  # (it fetches the generated docs/parts_index.json). All other pages use the
  # stock Material theme. See tools/build_catalog.py.
  custom_dir: overrides
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.top
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences

# Interactive part-view widget: a self-contained bundle (a vendored build of the
# upstream viewer widget, in docs/assets/) that hydrates each part page's
# `<div data-part-view>` from its inlined MoleculeInfo, rendering inside an
# iframe so the page's CSS / root font-size can't affect it. The fonts are
# loaded here too: the iframe self-loads them for rendering, but the sequence
# column-measurer runs in this (host) document and needs the same monospace.
extra_css:
  - https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap

extra_javascript:
  - assets/seqmake-part-view.js

plugins:
  - search
  - tags

validation:
  nav:
    omitted_files: ignore
  not_found: warn

# Per-type pages are generated by tools/build_catalog.py (one per SO type with
# >=1 validated part). Add a line here when the FIRST part of a new type is
# validated; the index + tag index discover all type pages regardless.
nav:
  - Catalog: index.md
  - Browse by type:
      - Promoters: types/promoters.md
      - Origins of replication: types/origins-of-replication.md
      - Coding sequences: types/coding-sequences.md
  - Collections: collections/index.md
  - Tags: tags.md
