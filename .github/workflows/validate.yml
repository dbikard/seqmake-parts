name: Validate catalog

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Content guard (lab-agnostic, tool-agnostic part content)
        run: python tools/check_content.py
      - name: Requests guard (sourcing/REQUESTS.md lists active requests only)
        run: python tools/check_requests.py
      - name: Link guard (relative Markdown links resolve)
        run: python tools/check_links.py
      - run: pip install -r requirements.txt pytest
      - name: Validate canonical part JSON against the schema
        run: python tools/validate_parts.py
      - name: .gb must be regenerable from the canonical JSON
        run: |
          python tools/build_gb.py
          if ! git diff --exit-code -- parts; then
            echo "::error::.gb out of sync with canonical JSON. Run 'python tools/build_gb.py' and commit."
            exit 1
          fi
      - name: Test the build + publish tooling
        run: pytest tests/ -q
      - name: Rebuild manifest (parses every .gb)
        run: python tools/build_catalog.py
      - name: catalog.json must be up to date
        run: |
          if ! git diff --exit-code catalog.json; then
            echo "::error::catalog.json is stale. Run 'python tools/build_catalog.py' and commit catalog.json."
            exit 1
          fi
      - name: Rebuild RDF (catalog.ttl + catalog.jsonld)
        run: python tools/build_rdf.py
      - name: catalog RDF must be up to date
        run: |
          if ! git diff --exit-code catalog.ttl catalog.jsonld tools/catalog_context.jsonld; then
            echo "::error::catalog RDF is stale. Run 'python tools/build_rdf.py' and commit catalog.ttl + catalog.jsonld."
            exit 1
          fi
      - name: Validate RDF against SHACL shapes
        run: pyshacl -s tools/shapes.ttl -i rdfs catalog.ttl
