name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  # The UniProt refresh commits to main with GITHUB_TOKEN, which does NOT trigger
  # a push event -- so redeploy when that workflow finishes successfully.
  workflow_run:
    workflows: ["Refresh UniProt features"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only deploy if the refresh actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python tools/build_catalog.py
      - run: python tools/build_rdf.py
      - run: mkdocs build
      - name: Publish RDF next to the site
        run: cp catalog.ttl catalog.jsonld site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
